<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Racer - Onchain</title>
  <style>
    body { 
      margin: 0; background: #000; font-family: Arial; overflow: hidden; 
    }
    canvas { 
      display: block; margin: 10px auto; 
      border: 4px solid #00ffff; 
      border-radius: 15px;
      box-shadow: 0 0 50px #00ffff;
    }
    #ui {
      position: absolute; top: 15px; left: 15px; z-index: 100;
      color: white; font-size: 22px; text-shadow: 0 0 10px #00ffff;
    }
    button {
      padding: 12px 24px; margin: 5px; font-size: 18px;
      background: #ff00ff; color: white; border: none; 
      border-radius: 10px; cursor: pointer;
    }
    #gameOver {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95); padding: 40px; border-radius: 20px;
      text-align: center; display: none; border: 4px solid #ff00ff;
      color: white;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Coins: <span id="coins">0</span></div>
    <button onclick="startGame()">START RACE</button>
    <button onclick="connectWallet()">Connect Wallet</button>
  </div>

  <canvas id="game" width="900" height="550"></canvas>

  <div id="gameOver">
    <h1>GAME OVER</h1>
    <p>Final Score: <span id="finalScore">0</span></p>
    <p>Coins Collected: <span id="finalCoins">0</span></p>
    <button onclick="restartGame()">PLAY AGAIN</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
