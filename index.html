<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Racer - Onchain</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #ui {
      position: absolute; top: 20px; left: 20px; color: white; z-index: 100; font-family: Arial;
      text-shadow: 0 0 10px #00ffff;
    }
    button {
      padding: 15px 30px; margin: 8px; font-size: 18px; background: #ff00ff; color: white;
      border: none; border-radius: 12px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Coins: <span id="coins">0</span></div>
    <button onclick="startGame()">🚀 START RACE</button>
    <button onclick="connectWallet()">🔗 Connect Wallet</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
