<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bike Racer - Onchain</title>
  <style>
    body { 
      margin: 0; 
      background: #000; 
      font-family: 'Arial', sans-serif; 
      overflow: hidden;
    }
    canvas { 
      display: block; 
      margin: 20px auto; 
      border: 4px solid #22ff88;
      border-radius: 15px;
      box-shadow: 0 0 40px #22ff88;
    }
    #ui {
      position: absolute; top: 25px; left: 25px; z-index: 100;
      background: rgba(0,0,0,0.75);
      padding: 15px 25px;
      border-radius: 12px;
      border: 2px solid #22ff88;
      color: white;
    }
    button {
      padding: 12px 25px;
      margin: 5px;
      font-size: 17px;
      background: #22ff88;
      color: black;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    #gameOver {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 30px 50px;
      border-radius: 15px;
      text-align: center;
      display: none;
      border: 3px solid #ff4444;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div style="font-size:28px; font-weight:bold;">🏍️ <span id="score">0</span></div>
    <div>Speed: <span id="speed">0</span> km/h</div>
    <button onclick="startGame()">🚀 Start Race</button>
    <button onclick="connectWallet()">🔗 Connect Wallet</button>
  </div>

  <canvas id="game" width="900" height="500"></canvas>

  <div id="gameOver">
    <h1>💥 Game Over</h1>
    <p>Your Score: <span id="finalScore">0</span></p>
    <button onclick="restartGame()">Play Again</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
